<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trane MTZ Package Unit Selector</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root{
    --bg:#0a0f0d; --panel:#101a16; --panel2:#0c1310; --line:#1d2a24; --line2:#21302a;
    --field:#0f1714; --accent:#3fae7a; --accent2:#7fd4a8; --txt:#e8f0ea; --mut:#9aa8a0; --mut2:#6b7a72;
    --fd:'Bebas Neue','Arial Narrow',sans-serif; --fb:'DM Sans',system-ui,sans-serif; --fm:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;min-height:100vh;font-family:var(--fb);color:var(--txt);
    background:radial-gradient(120% 80% at 80% -10%,#16241d 0%,#0a0f0d 55%);}
  select:focus,input:focus{border-color:var(--accent)!important;outline:none;}
  button{font-family:var(--fb);cursor:pointer;border:none;}
  .wrap{max-width:1000px;margin:0 auto;}
  header{border-bottom:1px solid var(--line);padding:24px 28px 20px;background:linear-gradient(180deg,#0d1411,transparent);}
  .hrow{max-width:1000px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;}
  .eyebrow{font-size:11px;letter-spacing:.3em;color:var(--accent);text-transform:uppercase;font-weight:700;}
  h1{font-family:var(--fd);font-size:44px;margin:6px 0 2px;letter-spacing:.03em;line-height:.95;font-weight:400;}
  h1 span{color:var(--accent);}
  .sub{color:var(--mut);font-size:14px;}
  .htools{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .seg{display:flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden;}
  .seg button{padding:11px 14px;background:var(--field);color:var(--mut);font-weight:700;font-size:12.5px;}
  .seg button.on{background:var(--accent);color:#06120c;}
  .btn{background:var(--accent);color:#06120c;border-radius:10px;padding:13px 22px;font-size:14px;font-weight:700;letter-spacing:.03em;box-shadow:0 4px 18px rgba(63,174,122,.3);}
  .btn:disabled{background:#23332b;color:#5a6960;cursor:not-allowed;box-shadow:none;}
  .grid{max-width:1000px;margin:0 auto;padding:26px 28px 60px;display:grid;grid-template-columns:minmax(0,340px) 1fr;gap:26px;}
  @media(max-width:760px){.grid{grid-template-columns:1fr;}}
  .card{background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:16px;padding:22px 20px;height:fit-content;}
  .ctitle{font-family:var(--fd);font-size:22px;letter-spacing:.04em;margin-bottom:18px;color:#cfe0d6;font-weight:400;}
  label.fld{display:block;margin-bottom:16px;}
  .lab{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut2);margin-bottom:6px;font-weight:600;}
  .lab .u{color:var(--mut);}
  input.in,select.in{width:100%;padding:11px 13px;background:var(--field);border:1px solid var(--line2);border-radius:8px;color:var(--txt);font-size:15px;font-family:var(--fm);}
  input.in{font-size:16px;}
  .hint{font-size:11px;color:var(--mut2);margin-top:5px;display:block;font-family:var(--fm);}
  .modeseg{display:flex;margin-bottom:16px;border:1px solid var(--line2);border-radius:8px;overflow:hidden;}
  .modeseg button{flex:1;padding:10px 8px;font-weight:700;font-size:12.5px;letter-spacing:.04em;background:var(--field);color:var(--mut);}
  .modeseg button.on{background:var(--accent);color:#06120c;}
  .row2{display:flex;gap:12px;}
  .row2>div{flex:1;}
  .note{font-size:11px;color:var(--mut2);line-height:1.5;font-family:var(--fm);border-top:1px solid var(--line);padding-top:12px;margin-top:2px;}
  .info{background:#0c1a14;border:1px solid #1d3a2c;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12.5px;color:var(--accent2);font-family:var(--fm);}
  .cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
  .rc{background:var(--field);border:1px solid var(--line2);border-radius:10px;padding:16px 18px;flex:1 1 130px;}
  .rc .rl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut2);font-weight:700;margin-bottom:8px;}
  .rc .rv{font-family:var(--fd);font-size:36px;line-height:.9;letter-spacing:.02em;}
  .rc .rs{font-size:11px;color:var(--mut);margin-top:5px;font-family:var(--fm);}
  .psy{background:#0d1411;border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin-bottom:12px;}
  .psy .pt{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut2);font-weight:700;margin-bottom:10px;}
  .psy .pl{font-family:var(--fm);font-size:12.5px;color:#b8c8be;line-height:1.9;}
  .flags{background:#1c1407;border:1px solid #4a3410;border-radius:12px;padding:14px 16px;}
  .flags .ft{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#e0a23a;font-weight:700;margin-bottom:8px;}
  .flags .fl{font-size:12.5px;color:#d8c08a;line-height:1.5;margin-bottom:4px;}
  .discl{font-size:11px;color:#56655d;margin-top:16px;line-height:1.6;font-family:var(--fm);}
  /* ranking table */
  .rankhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
  .rankhead .rt{font-family:var(--fd);font-size:24px;letter-spacing:.04em;color:#cfe0d6;font-weight:400;}
  .rankhead .rc2{font-size:12px;color:var(--mut);font-family:var(--fm);}
  table.rank{width:100%;border-collapse:collapse;font-family:var(--fm);font-size:12.5px;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  table.rank th{background:#0d1411;color:var(--mut2);padding:9px 12px;font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;text-align:right;}
  table.rank th.l{text-align:left;}
  table.rank td{padding:9px 12px;text-align:right;white-space:nowrap;border-top:1px solid #16221c;}
  table.rank td.name{text-align:left;font-weight:700;}
  table.rank tr.r{cursor:pointer;color:var(--txt);}
  table.rank tr.r.bad{color:#7a8980;}
  table.rank tr.r.best{background:rgba(63,174,122,.10);}
  .placeholder{color:var(--mut2);font-family:var(--fm);font-size:13px;padding:40px 8px;}
  .warnbox{background:#1c1407;border:1px solid #4a3410;border-radius:10px;padding:12px 14px;margin-top:12px;font-size:12.5px;color:#d8c08a;}
  .footn{font-size:11px;color:var(--mut2);margin-top:14px;line-height:1.6;font-family:var(--fm);}
  /* print overlay */
  .overlay{position:fixed;inset:0;z-index:1000;background:rgba(6,12,9,.82);overflow:auto;padding:24px 16px;-webkit-overflow-scrolling:touch;}
  .obar{max-width:794px;margin:0 auto 14px;display:flex;gap:10px;justify-content:flex-end;}
  .obar .pr{background:var(--accent);color:#06120c;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;letter-spacing:.03em;}
  .obar .cl{background:#23332b;color:#cfe0d6;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:700;}
  .sheet{max-width:794px;margin:0 auto;background:#fff;color:#111;font-family:var(--fb);font-size:12px;padding:32px 34px;border-radius:4px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .sheet .shead{border-bottom:3px solid #111;padding-bottom:10px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:flex-end;}
  .sheet .seye{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#555;font-weight:700;}
  .sheet .smodel{font-family:var(--fd);font-size:64px;line-height:.85;letter-spacing:.02em;margin-top:4px;font-weight:400;}
  .sheet .sfull{font-size:11px;color:#555;margin-top:2px;}
  .sheet .sright{text-align:right;font-size:11px;color:#444;line-height:1.7;}
  .sheet table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:12px;}
  .sheet .stitle{background:#111;color:#fff;padding:5px 10px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:4px;}
  .tdL{padding:7px 10px;border:1px solid #ccc;background:#f3f5f4;font-weight:600;color:#444;width:22%;font-size:11px;}
  .tdV{padding:7px 10px;border:1px solid #ccc;color:#111;width:28%;}
  .tdVb{font-weight:700;}
  .ratehdr{background:#eef1f0;}
  .sfoot{border-top:1px solid #999;padding-top:8px;font-size:9.5px;color:#666;line-height:1.5;}
  .gnote{font-size:9.5px;color:#777;font-style:italic;margin-bottom:8px;}
  .pflags{border:1px solid #c98a1a;background:#fff8ec;border-radius:6px;padding:8px 12px;margin-bottom:8px;}
  .pflags b{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#a8730f;}
  .pflags .pf{font-size:10.5px;color:#7a560c;margin-top:3px;}
  @media print{
    @page{size:A4 portrait;margin:14mm;}
    html,body{background:#fff!important;}
    body *{visibility:hidden!important;}
    #sheet,#sheet *{visibility:visible!important;}
    #sheet{position:absolute!important;left:0;top:0;width:100%!important;padding:0!important;box-shadow:none!important;background:#fff!important;border-radius:0!important;}
    .no-print{display:none!important;}
  }
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div>
      <div class="eyebrow">Trane · Tropical Application</div>
      <h1>MTZ Package Unit <span>Selector</span></h1>
      <div class="sub">airflow-based selection · interpolated performance · printable datasheet</div>
    </div>
    <div class="htools">
      <div class="seg" id="unitseg">
        <button data-u="imperial" class="on">Imperial</button>
        <button data-u="si">SI / Metric</button>
      </div>
      <button class="btn" id="printbtn" disabled>&#9113; Print Datasheet</button>
    </div>
  </div>
</header>

<div class="grid">
  <!-- INPUTS -->
  <div class="card">
    <div class="ctitle">Project &amp; Inputs</div>
    <label class="fld"><span class="lab">Project Name</span>
      <input class="in" id="project" type="text" placeholder="e.g. MOEHE STEM School"></label>
    <label class="fld"><span class="lab">Unit Tag</span>
      <input class="in" id="tag" type="text" placeholder="e.g. PAC-01"></label>

    <div class="modeseg" id="modeseg">
      <button data-m="auto" class="on">Auto-Select</button>
      <button data-m="manual">Single Model</button>
    </div>

    <div id="autoInputs">
      <label class="fld"><span class="lab">Required Total Cooling <span class="u" id="capU1">· MBtu/h</span></span>
        <input class="in" id="reqTC" type="number" value="100">
        <span class="hint" id="reqTChint"></span></label>
      <label class="fld"><span class="lab">Required Sensible (optional) <span class="u" id="capU2">· MBtu/h</span></span>
        <input class="in" id="reqSC" type="number">
        <span class="hint">Leave blank to rank on total capacity only.</span></label>
    </div>

    <div id="manualInputs" style="display:none">
      <label class="fld"><span class="lab">Model</span>
        <select class="in" id="model"></select>
        <span class="hint" id="drivehint"></span></label>
      <label class="fld"><span class="lab">Airflow <span class="u" id="flowU">· CFM</span></span>
        <input class="in" id="airflow" type="number" placeholder="enter airflow">
        <span class="hint" id="airflowhint"></span></label>
    </div>

    <div class="row2">
      <label class="fld"><span class="lab">On-coil DB <span class="u tu">· &deg;F</span></span>
        <input class="in" id="db" type="number" value="80"></label>
      <label class="fld"><span class="lab">On-coil WB <span class="u tu">· &deg;F</span></span>
        <input class="in" id="wb" type="number" value="67"></label>
    </div>
    <label class="fld"><span class="lab">Ambient (outdoor) <span class="u tu">· &deg;F</span></span>
      <input class="in" id="amb" type="number" value="115"></label>

    <div class="note" id="gridnote"></div>
  </div>

  <!-- RESULTS -->
  <div id="results"></div>
</div>

<div id="overlayMount"></div>

const DB_AX = MTZ_DATA.db, WB_AX = MTZ_DATA.wb, AMB_AX = MTZ_DATA.amb;

// ---------- psychrometrics (sea level, ASHRAE) ----------
const P_ATM = 14.696;
function pWs(T) {
  const TR = T + 459.67;
  let ln;
  if (T < 32) {
    ln = -1.0214165e4/TR - 4.8932428 - 5.3765794e-3*TR + 1.9202377e-7*TR**2
       + 3.5575832e-10*TR**3 - 9.0344688e-14*TR**4 + 4.1635019*Math.log(TR);
  } else {
    ln = -1.0440397e4/TR - 1.1294650e1 - 2.7022355e-2*TR + 1.2890360e-5*TR**2
       - 2.4780681e-9*TR**3 + 6.5459673*Math.log(TR);
  }
  return Math.exp(ln);
}
function wFromDbWb(Tdb, Twb) {
  const pwsWb = pWs(Twb);
  const Ws = 0.621945*pwsWb/(P_ATM - pwsWb);
  const W = ((1093 - 0.556*Twb)*Ws - 0.240*(Tdb - Twb))/(1093 + 0.444*Tdb - Twb);
  return Math.max(W, 0);
}
const enthalpy = (Tdb, W) => 0.240*Tdb + W*(1061 + 0.444*Tdb);
function wbFromDbH(Tdb, h) {
  let lo = -20, hi = Tdb;
  for (let i = 0; i < 60; i++) {
    const mid = (lo+hi)/2;
    if (enthalpy(Tdb, wFromDbWb(Tdb, mid)) < h) lo = mid; else hi = mid;
  }
  return (lo+hi)/2;
}

function bracket(axis, x) {
  if (x <= axis[0]) return { i0:0, i1:0, f:0, lo:x<axis[0], hi:false };
  const n = axis.length;
  if (x >= axis[n-1]) return { i0:n-1, i1:n-1, f:0, lo:false, hi:x>axis[n-1] };
  for (let i = 0; i < n-1; i++)
    if (x >= axis[i] && x <= axis[i+1])
      return { i0:i, i1:i+1, f:(x-axis[i])/(axis[i+1]-axis[i]), lo:false, hi:false };
  return { i0:n-1, i1:n-1, f:0, lo:false, hi:false };
}
// Like bracket(), but linearly EXTRAPOLATES past the ends using the two
// outermost grid points (f<0 below the first point, f>1 above the last).
// Used for the airflow axis so capacities follow the catalogue trend
// beyond the tested airflow band instead of being clamped.
function bracketExtrap(axis, x) {
  const n = axis.length;
  if (n < 2) return bracket(axis, x);
  if (x < axis[0])   return { i0:0,   i1:1,   f:(x-axis[0])/(axis[1]-axis[0]),       lo:true,  hi:false }; // f<0
  if (x > axis[n-1]) return { i0:n-2, i1:n-1, f:(x-axis[n-2])/(axis[n-1]-axis[n-2]), lo:false, hi:true  }; // f>1
  for (let i = 0; i < n-1; i++)
    if (x >= axis[i] && x <= axis[i+1])
      return { i0:i, i1:i+1, f:(x-axis[i])/(axis[i+1]-axis[i]), lo:false, hi:false };
  return { i0:n-1, i1:n-1, f:0, lo:false, hi:false };
}
function rowSuspect(block) {
  const [tc,,pi] = block;
  for (let i=0;i<3;i++){ if(tc[i+1]<tc[i]-0.05)return true; if(pi[i+1]<pi[i]-0.5)return true; }
  return false;
}

function interpolate(modelKey, airflow, db, wb, amb) {
  const m = MTZ_DATA.models[modelKey], AF = m.airflows;
  const bAf=bracketExtrap(AF,airflow), bDb=bracket(DB_AX,db), bWb=bracket(WB_AX,wb), bAmb=bracket(AMB_AX,amb);
  const warnings=[];
  if(bDb.lo||bDb.hi) warnings.push(`Entering DB ${db}°F outside table ${DB_AX[0]}–${DB_AX[DB_AX.length-1]}; clamped.`);
  if(bWb.lo||bWb.hi) warnings.push(`Entering WB ${wb}°F outside table ${WB_AX[0]}–${WB_AX[WB_AX.length-1]}; clamped.`);
  if(bAmb.lo||bAmb.hi) warnings.push(`Ambient ${amb}°F outside table ${AMB_AX[0]}–${AMB_AX[AMB_AX.length-1]}; clamped.`);
  if(bAf.lo||bAf.hi) warnings.push(`Airflow ${airflow} CFM outside capacity-table band ${AF[0]}–${AF[AF.length-1]}; capacities linearly extrapolated.`);
  const cell=(afi,ambi,wbi,dbi,met)=>m.grid[`${AMB_AX[ambi]}_${WB_AX[wbi]}`][afi][met][dbi];
  let suspect=false;
  const interp=(met)=>{
    let acc=0;
    for(const[afi,afw]of[[bAf.i0,1-bAf.f],[bAf.i1,bAf.f]]){ if(afw===0&&bAf.i0!==bAf.i1)continue;
      for(const[ambi,ambw]of[[bAmb.i0,1-bAmb.f],[bAmb.i1,bAmb.f]]){ if(ambw===0&&bAmb.i0!==bAmb.i1)continue;
        for(const[wbi,wbw]of[[bWb.i0,1-bWb.f],[bWb.i1,bWb.f]]){ if(wbw===0&&bWb.i0!==bWb.i1)continue;
          if(rowSuspect(m.grid[`${AMB_AX[ambi]}_${WB_AX[wbi]}`][afi])) suspect=true;
          for(const[dbi,dbw]of[[bDb.i0,1-bDb.f],[bDb.i1,bDb.f]]){ if(dbw===0&&bDb.i0!==bDb.i1)continue;
            acc+=afw*ambw*wbw*dbw*cell(afi,ambi,wbi,dbi,met);}}}}
    return acc;
  };
  let TC=interp(0), SC=interp(1); const PI=interp(2);
  let scClamped=false; if(SC>TC){SC=TC;scClamped=true;}
  if(suspect) warnings.push("Draws on catalogue cell(s) that violate expected psychrometric trends (likely OCR artifact). Verify against printed catalogue before quoting.");
  if(scClamped) warnings.push("Interpolated sensible exceeded total; clamped SC = TC.");
  return { TC, SC, PI, warnings };
}

function offCoil(dbOn, wbOn, cfm, TC, SC) {
  const Won=wFromDbWb(dbOn,wbOn), hOn=enthalpy(dbOn,Won);
  const dbOff=dbOn-(SC*1000)/(1.08*cfm);
  const hOff=hOn-(TC*1000)/(4.5*cfm);
  let wbOff=wbFromDbH(dbOff,hOff); if(wbOff>dbOff)wbOff=dbOff;
  return { dbOff, wbOff, hOn, hOff, Won, Woff:wFromDbWb(dbOff,wbOff) };
}

// ---------- fan / ESP envelope ----------
function fanEsps(modelKey){ return Object.keys(MTZ_DATA.models[modelKey].fan.rows).map(Number).sort((a,b)=>a-b); }
function fanAt(modelKey, esp){
  // interpolate the airflow envelope + rated rpm/pw linearly between ESP rows
  const f=MTZ_DATA.models[modelKey].fan, esps=fanEsps(modelKey);
  const b=bracket(esps, esp);
  const r0=f.rows[esps[b.i0]], r1=f.rows[esps[b.i1]];
  const mix=(k)=> r0[k]*(1-b.f)+r1[k]*b.f;
  return {
    cfm_min:Math.round(mix("cfm_min")), cfm_max:Math.round(mix("cfm_max")),
    cfm_rated:Math.round(mix("cfm_rated")), rpm:Math.round(mix("rpm")),
    pw:Math.round(mix("pw")), espMin:esps[0], espMax:esps[esps.length-1],
    clamped: b.lo||b.hi
  };
}

// ---------- auto-select: rank every model against a required load ----------
// requiredTC, requiredSC in MBtu/h (1000 Btu/h). Each model is evaluated at
// its rated airflow (at its own catalogue/rated ESP), then at the design DB/WB/ambient.
function rankModels(reqTC, reqSC, db, wb, amb) {
  return MODELS.map((key) => {
    const fan = fanAt(key, MTZ_DATA.models[key].fan.rated_esp);
    const r = interpolate(key, fan.cfm_rated, db, wb, amb);
    const oc = offCoil(db, wb, fan.cfm_rated, r.TC, r.SC);
    const tcMargin = reqTC > 0 ? (r.TC - reqTC) / reqTC : null;     // fraction over/under
    const scMargin = reqSC > 0 ? (r.SC - reqSC) / reqSC : null;
    const tcOK = reqTC > 0 ? r.TC >= reqTC : true;
    const scOK = reqSC > 0 ? r.SC >= reqSC : true;
    const adequate = tcOK && scOK;
    return {
      key, tons: MTZ_DATA.models[key].tons, fan, r, oc,
      tcMargin, scMargin, tcOK, scOK, adequate,
      warnings: r.warnings,
    };
  }).sort((a, b) => {
    // adequate units first; among those, smallest TC oversize (tightest fit);
    // inadequate units last, ordered by how close they get.
    if (a.adequate !== b.adequate) return a.adequate ? -1 : 1;
    if (a.adequate) {
      const am = a.tcMargin == null ? 0 : a.tcMargin;
      const bm = b.tcMargin == null ? 0 : b.tcMargin;
      return am - bm;
    }
    return (b.tcMargin ?? -1) - (a.tcMargin ?? -1); // least-negative first
  });
}

const MODELS = Object.keys(MTZ_DATA.models);

const S = { mode:"auto", units:"imperial", model:"MTZH180",
  reqTC:"100", reqSC:"", airflow:"", db:"80", wb:"67", amb:"115",

const SI = ()=>S.units==="si";

// ---------------- conversions ----------------
const f2c=f=>(f-32)*5/9, c2f=c=>c*9/5+32;
const cfm2ls=q=>q*0.471947, ls2cfm=q=>q/0.471947;
const mbh2kw=m=>m*0.293071, kw2mbh=k=>k/0.293071;
const TRf=m=>m/12;
const tIn =v=>SI()?c2f(parseFloat(v)):parseFloat(v);
const qIn =v=>SI()?ls2cfm(parseFloat(v)):parseFloat(v);
const capIn=v=>SI()?kw2mbh(parseFloat(v)):parseFloat(v);
const tOut =f=>SI()?f2c(f):f;

const U=()=>SI()?{temp:"°C",flow:"L/s",cap:"kW"}:{temp:"°F",flow:"CFM",cap:"MBtu/h"};
const fmt=(x,p=1)=>(x==null||isNaN(x))?"—":x.toLocaleString(undefined,{minimumFractionDigits:p,maximumFractionDigits:p});

// fan data at the model's rated fan row (no ESP input)
function fanRated(modelKey){
  const f = fanAt(modelKey, MTZ_DATA.models[modelKey].fan.rated_esp);
  // Airflow range = full operating envelope from the catalogue fan tables:
  // minimum of every row's cfm_min, maximum of every row's cfm_max (across all ESP/speed settings).
  const rows = Object.values(MTZ_DATA.models[modelKey].fan.rows);
  f.cfm_min = Math.min(...rows.map(r=>r.cfm_min));
  f.cfm_max = Math.max(...rows.map(r=>r.cfm_max));
  // keep cfm_rated within the envelope
  f.cfm_rated = Math.min(Math.max(f.cfm_rated, f.cfm_min), f.cfm_max);
  return f;
}

// ---------------- compute ----------------
function compute(){
  const d=tIn(S.db), w=tIn(S.wb), a=tIn(S.amb);

  if(isNaN(af)){ used=fan.cfm_rated; note="Using rated airflow "+fmt(qOut(fan.cfm_rated),0)+" "+U().flow+"."; }
  else if(af<fan.cfm_min){ used=fan.cfm_min; note="Below fan minimum; clamped to "+fmt(qOut(fan.cfm_min),0)+" "+U().flow+"."; }
  else if(af>fan.cfm_max){ used=fan.cfm_max; note="Above fan maximum; clamped to "+fmt(qOut(fan.cfm_max),0)+" "+U().flow+"."; }
  else used=af;
  const r=interpolate(S.model, used, d, w, a);
  const oc=offCoil(d,w,used,r.TC,r.SC);
  return {...r, oc, airflow:used, fan, note, d, w, a};
}
function computeRanking(){
  const d=tIn(S.db), w=tIn(S.wb), a=tIn(S.amb);
  const rt=capIn(S.reqTC), rs=capIn(S.reqSC);
  if([d,w,a].some(isNaN)||isNaN(rt)) return null;
  return rankModels(rt, isNaN(rs)?0:rs, d, w, a);
}

// ---------------- render ----------------
function el(id){ return document.getElementById(id); }

function renderModelOptions(){
  const sel=el("model"); sel.innerHTML="";
  MODELS.forEach(k=>{ const o=document.createElement("option");
    o.value=k; o.textContent=k+" — "+MTZ_DATA.models[k].tons+" Ton"+(MTZ_DATA.models[k].general?"":"  (no general data)");
    sel.appendChild(o); });
  sel.value=S.model;
}

function syncUnitLabels(){
  const u=U();
  document.querySelectorAll(".tu").forEach(s=>s.innerHTML="· "+u.temp);
  el("capU1").textContent="· "+u.cap; el("capU2").textContent="· "+u.cap; el("flowU").textContent="· "+u.flow;
  el("gridnote").textContent = SI()
    ? "Capacity grid: DB 24–32 · WB 16–23 · Ambient 29–52 "+u.temp+". Quad-linear, clamped at edges."
    : "Capacity grid: DB 75–90 · WB 61–73 · Ambient 85–125 "+u.temp+". Quad-linear, clamped at edges.";
}

function renderResults(){
  const box=el("results");
  if(S.mode==="auto"){
    const rk=computeRanking();
    if(!rk){ box.innerHTML='<div class="placeholder">Enter a required total cooling load and design conditions to rank all '+MODELS.length+' models.</div>'; el("printbtn").disabled=true; return; }
    const u=U();
    let rows="";
    rk.forEach((row,i)=>{
      const best=i===0&&row.adequate;
      const cls="r"+(best?" best":"")+(row.adequate?"":" bad");
      const col=row.adequate?(best?"#3fae7a":"var(--txt)"):"#7a8980";
      const mcol=row.tcOK?"#7fd4a8":"#e0894a";
      const mg=row.tcMargin==null?"—":((row.tcMargin>=0?"+":"")+(row.tcMargin*100).toFixed(0)+"%");
      rows+='<tr class="'+cls+'" data-pick="'+row.key+'">'
        +'<td class="name" style="color:'+col+'">'+(best?'<span style="color:#3fae7a;margin-right:6px">★</span>':'')+row.key+'<span style="color:#6b7a72;font-weight:400"> · '+row.tons+'T</span></td>'
        +'<td>'+fmt(capOut(row.r.TC))+'</td><td>'+fmt(capOut(row.r.SC))+'</td>'
        +'<td style="color:'+mcol+'">'+mg+'</td><td>'+fmt(row.r.PI/1000,1)+'</td>'
        +'<td style="color:#3fae7a;font-size:11px">select →</td></tr>';
    });
    const anyOK=rk.some(r=>r.adequate);
    box.innerHTML=''
      +'<div class="rankhead"><div class="rt">Ranked Selection</div>'
      +'<div class="rc2">Need '+fmt(capOut(capIn(S.reqTC)))+' '+u.cap+(S.reqSC&&!isNaN(parseFloat(S.reqSC))?' · '+fmt(capOut(capIn(S.reqSC)))+' sens.':'')+' @ '+S.db+'/'+S.wb+u.temp+', '+S.amb+u.temp+' amb</div></div>'
      +'<table class="rank"><thead><tr><th class="l">Model</th><th>TC<br><span style="font-weight:400;font-size:9px">'+u.cap+'</span></th><th>SC<br><span style="font-weight:400;font-size:9px">'+u.cap+'</span></th><th>Margin</th><th>kW</th><th> </th></tr></thead><tbody>'+rows+'</tbody></table>'
      +(anyOK?'':'<div class="warnbox">⚠ No single MTZ unit meets '+fmt(capOut(capIn(S.reqTC)))+' '+u.cap+' at these conditions. Closest is '+rk[0].key+' ('+fmt(capOut(rk[0].r.TC))+' '+u.cap+'). Consider multiple units or relaxing design conditions.</div>')
      +'<div class="footn">Evaluated at each model\u2019s rated airflow. ★ = smallest unit that covers the load (tightest fit). Tap any row to open it in Single-Model mode for airflow tuning and a printable datasheet.</div>';
    box.querySelectorAll("tr.r").forEach(tr=>tr.addEventListener("click",()=>{
      S.model=tr.getAttribute("data-pick"); S.airflow=""; S.mode="manual"; syncMode(); el("airflow").value=""; el("model").value=S.model; render();
    }));
    el("printbtn").disabled=true; // print is for a single selected unit
    return;
  }
  // manual mode
  const res=compute();
  const m=MTZ_DATA.models[S.model];
  el("printbtn").disabled=!res;
  if(!res){ box.innerHTML='<div class="placeholder">Enter valid design conditions to see performance.</div>'; return; }
  const u=U(); const fan=res.fan;
  const eer=res.TC*1000/res.PI, cop=res.TC*1000/3.412/res.PI;
  let html="";
  if(res.note) html+='<div class="info">ⓘ '+res.note+'</div>';
  html+='<div class="cards">'
    +rc("Total Cap.",fmt(capOut(res.TC)),u.cap,fmt(TRf(res.TC),2)+" TR","#3fae7a")
    +rc("Sensible Cap.",fmt(capOut(res.SC)),u.cap,"SHR "+(res.SC/res.TC).toFixed(2))
    +rc("Power Input",fmt(res.PI/1000,2),"kW",fmt(res.PI,0)+" W")
    +'</div><div class="cards">'
    +rc("Airflow (used)",fmt(qOut(res.airflow),0),u.flow,"as entered","#7fd4a8")
    +rc("Off-coil DB",fmt(tOut(res.oc.dbOff)),u.temp,"Δ "+fmt((res.d-res.oc.dbOff)*(SI()?5/9:1)))
    +rc("Off-coil WB",fmt(tOut(res.oc.wbOff)),u.temp,"Δ "+fmt((res.w-res.oc.wbOff)*(SI()?5/9:1)))
    +'</div><div class="cards">'
    +rc("Fan Speed",fmt(fan.rpm,0),"RPM","at rated")
    +rc("Fan Power",fmt(fan.pw/1000,2),"kW",fmt(fan.pw,0)+" W")
    +rc("EER",fmt(eer,2),"Btu/h·W","COP "+cop.toFixed(2))
    +'</div>';
  html+='<div class="psy"><div class="pt">Psychrometric Balance · sea level</div><div class="pl">'
    +'<div>On-coil&nbsp;&nbsp;: '+fmt(tOut(res.d))+'°DB / '+fmt(tOut(res.w))+'°WB&nbsp;&nbsp;h='+fmt(res.oc.hOn,2)+' Btu/lb&nbsp;&nbsp;W='+res.oc.Won.toFixed(4)+'</div>'
    +'<div>Off-coil&nbsp;: '+fmt(tOut(res.oc.dbOff))+'°DB / '+fmt(tOut(res.oc.wbOff))+'°WB&nbsp;&nbsp;h='+fmt(res.oc.hOff,2)+' Btu/lb&nbsp;&nbsp;W='+res.oc.Woff.toFixed(4)+'</div>'
    +'</div></div>';
  if(res.warnings&&res.warnings.length){
    html+='<div class="flags"><div class="ft">⚠ Flags</div>'+res.warnings.map(w=>'<div class="fl">· '+w+'</div>').join('')+'</div>';
  }
  html+='<div class="discl">Capacities gross (no fan-heat deduction) per catalogue. Interpolated from grid points — confirm against manufacturer software for submittal.</div>';
  box.innerHTML=html;
}
function rc(l,v,u,s,accent){
  return '<div class="rc"><div class="rl">'+l+'</div><div class="rv"'+(accent?' style="color:'+accent+'"':'')+'>'+v+'</div><div class="rs">'+u+(s?' · '+s:'')+'</div></div>';
}

function renderDatasheet(){
  const res=compute(); if(!res) return "";
  const m=MTZ_DATA.models[S.model]; const g=m.general||null; const u=U(); const fan=res.fan;
  const eer=res.TC*1000/res.PI;
  const td=(l,v)=>'<td class="tdL">'+l+'</td><td class="tdV">'+v+'</td>';
  const tdb=(l,v)=>'<td class="tdL">'+l+'</td><td class="tdV tdVb">'+v+'</td>';
  let h='<div class="shead"><div>'
    +'<div class="seye">Trane · MTZ Package Unit · Tropical Application</div>'
    +'<div class="smodel">'+S.model+'</div>'
    +(g?'<div class="sfull">'+g.full_model+'</div>':'')
    +'</div><div class="sright"><div><b>'+m.tons+' Ton</b> · Cooling Only</div><div>'+(g?g.power_supply:"380–415V / 3 / 50Hz")+'</div><div>Horizontal Flow</div></div></div>';

  h+='<table><tbody>'
    +'<tr>'+td("Project",S.project||"—")+td("Unit Tag",S.tag||"—")+'</tr>'
    +'<tr>'+td("Print Date",new Date().toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}))
    +td("Drive Type",m.fan.type==="direct"?"Direct (3-speed)":"Belt (adjustable pulley)")+'</tr>'
    +'</tbody></table>';

  h+='<div class="stitle">Selection Inputs</div><table><tbody>'
    +'<tr>'+td("Airflow",fmt(qOut(res.airflow),0)+" "+u.flow)+td("Fan Airflow Range",fmt(qOut(fan.cfm_min),0)+"–"+fmt(qOut(fan.cfm_max),0)+" "+u.flow)+'</tr>'
    +'<tr>'+td("On-coil Dry Bulb",fmt(tOut(res.d))+" "+u.temp)+td("On-coil Wet Bulb",fmt(tOut(res.w))+" "+u.temp)+'</tr>'
    +'<tr>'+td("Ambient (outdoor)",fmt(tOut(res.a))+" "+u.temp)+td("Fan Speed / Power",fmt(fan.rpm,0)+" RPM / "+fmt(fan.pw/1000,2)+" kW")+'</tr>'
    +'</tbody></table>';

  h+='<div class="stitle">Performance Data</div><table><tbody>'
    +'<tr>'+tdb("Total Cooling Capacity",fmt(capOut(res.TC))+" "+u.cap+"&nbsp;&nbsp;("+fmt(TRf(res.TC),2)+" TR)")+tdb("Sensible Capacity",fmt(capOut(res.SC))+" "+u.cap)+'</tr>'
    +'<tr>'+td("Airflow Rate",fmt(qOut(res.airflow),0)+" "+u.flow)+td("Power Input",fmt(res.PI/1000,2)+" kW ("+fmt(res.PI,0)+" W)")+'</tr>'
    +'<tr>'+td("Sensible Heat Ratio",(res.SC/res.TC).toFixed(2))+td("EER",fmt(eer,2)+" Btu/h·W")+'</tr>'
    +'<tr>'+td("Off-coil DB / WB",fmt(tOut(res.oc.dbOff))+" / "+fmt(tOut(res.oc.wbOff))+" "+u.temp)+td("Nominal Tons (TR)",fmt(TRf(res.TC),2)+" TR")+'</tr>'
    +'</tbody></table>';

  // Standard unit info (general data)
  h+='<div class="stitle">Standard Unit Information</div><table><tbody>'
    +'<tr>'+td("Model No.",g?g.full_model:S.model)+td("Nominal Capacity",m.tons+" Ton")+'</tr>'
    +'<tr>'+td("Power Supply",g?g.power_supply:"380–415V / 3Ph / 50Hz")+td("Function","Cooling Only")+'</tr>'
    +'<tr>'+td("Net Dimensions (W×D×H)",g?g.net_dim:"—")+td("Air Flow Config.","Horizontal Flow")+'</tr>'
    +'<tr>'+td("Net / Gross Weight",g?(g.net_weight_kg+" / "+g.gross_weight_kg+" kg"):"—")+td("Max. Current",g?(g.max_current_a+" A"):"—")+'</tr>'
    +'<tr>'+td("Compressor",g?(g.comp_qty+"× "+g.comp_brand+" "+g.comp_type):"—")+td("Max. Input",g?(g.max_input_kw+" kW"):"—")+'</tr>'
    +'<tr>'+td("Compressor Model",g?g.comp_model:"—")+td("Outdoor Fan",g?g.outdoor_fan:"—")+'</tr>'
    +'<tr>'+td("Refrigerant / Charge",g?(g.refrigerant+" · "+g.ref_charge):"—")+td("Refrigerant Control",g?g.ref_control:"—")+'</tr>'
    +'</tbody></table>';

  if(g){
    h+='<div class="stitle">Catalogue Ratings (published)</div><table><tbody>'
      +'<tr class="ratehdr"><td class="tdL">Condition</td><td class="tdV tdVb">Total Cooling</td><td class="tdV tdVb">Power Input</td><td class="tdV tdVb">EER</td></tr>'
      +'<tr><td class="tdL">(1) 80/67°F · 95°F amb (T1)</td><td class="tdV">'+g.cap1_btuh.toLocaleString()+' Btu/h · '+g.cap1_kw+' kW</td><td class="tdV">'+g.pi1_kw+' kW</td><td class="tdV">'+g.eer1+'</td></tr>'
      +'<tr><td class="tdL">(2) 80/67°F · 115°F amb (T3)</td><td class="tdV">'+g.cap2_btuh.toLocaleString()+' Btu/h · '+g.cap2_kw+' kW</td><td class="tdV">'+g.pi2_kw+' kW</td><td class="tdV">'+g.eer2+'</td></tr>'
      +'<tr><td class="tdL">Rated Indoor Airflow</td><td class="tdV">'+g.rated_cfm.toLocaleString()+' CFM</td><td class="tdL">Catalogue ESP</td><td class="tdV">'+g.esp_pa+' Pa</td></tr>'
      +'</tbody></table>';
  } else {
    h+='<div class="gnote">General data not yet loaded for this model — fields marked “—” to be completed from the unit catalogue page.</div>';
  }

  if(res.warnings&&res.warnings.length){
    h+='<div class="pflags"><b>Flags</b>'+res.warnings.map(w=>'<div class="pf">· '+w+'</div>').join('')+'</div>';
  }
  h+='<div class="sfoot">Capacities are gross (no fan-heat deduction) per catalogue note. Performance values are interpolated from catalogue grid points at sea-level psychrometrics and should be confirmed against the manufacturer’s selection software prior to submittal. Generated by MTZ Package Unit Selector.</div>';
  return h;
}

function openSheet(){
  const content=renderDatasheet(); if(!content) return;
  el("overlayMount").innerHTML=
    '<div class="overlay"><div class="obar no-print">'
    +'<button class="pr">⎙ Print / Save as PDF</button>'
    +'<button class="cl">✕ Close</button></div>'
    +'<div class="sheet" id="sheet">'+content+'</div></div>';
  el("overlayMount").querySelector(".pr").addEventListener("click",()=>window.print());
  el("overlayMount").querySelector(".cl").addEventListener("click",()=>{ el("overlayMount").innerHTML=""; });
}

function syncMode(){
  document.querySelectorAll("#modeseg button").forEach(b=>b.classList.toggle("on",b.dataset.m===S.mode));
  el("autoInputs").style.display = S.mode==="auto"?"block":"none";
  el("manualInputs").style.display = S.mode==="manual"?"block":"none";
}

function syncReqHint(){
  const v=S.reqTC;
  el("reqTChint").textContent="= "+(v&&!isNaN(parseFloat(v))?TRf(capIn(v)).toFixed(1):"—")+" TR. Models ranked at rated airflow.";
}
function syncAirflowHint(){
  const fan=fanRated(S.model); const u=U();
  el("airflowhint").textContent="Fan range "+fmt(qOut(fan.cfm_min),0)+"–"+fmt(qOut(fan.cfm_max),0)+" "+u.flow+" · rated "+fmt(qOut(fan.cfm_rated),0)+". Leave blank to use rated.";
  el("drivehint").textContent="Drive: "+(MTZ_DATA.models[S.model].fan.type==="direct"?"Direct (3-speed)":"Belt (adjustable pulley)");
}

function render(){
  syncUnitLabels(); syncReqHint(); syncAirflowHint(); renderResults();
}

// ---------------- wire up ----------------
function switchUnits(target){
  if(target===S.units) return;
  const toSI=target==="si";
  const conv=(v,kind)=>{ const n=parseFloat(v); if(isNaN(n))return v; let o;
    if(kind==="temp")o=toSI?(n-32)*5/9:n*9/5+32;
    else if(kind==="flow")o=toSI?n*0.471947:n/0.471947;
    else o=toSI?n*0.293071:n/0.293071;
    return String(Math.round(o*10)/10); };
  S.db=conv(S.db,"temp"); S.wb=conv(S.wb,"temp"); S.amb=conv(S.amb,"temp");
  S.airflow=S.airflow===""?"":conv(S.airflow,"flow");
  S.reqTC=conv(S.reqTC,"cap"); S.reqSC=S.reqSC===""?"":conv(S.reqSC,"cap");
  S.units=target;
  el("db").value=S.db; el("wb").value=S.wb; el("amb").value=S.amb;
  el("airflow").value=S.airflow; el("reqTC").value=S.reqTC; el("reqSC").value=S.reqSC;
  document.querySelectorAll("#unitseg button").forEach(b=>b.classList.toggle("on",b.dataset.u===target));
  render();
}

document.querySelectorAll("#unitseg button").forEach(b=>b.addEventListener("click",()=>switchUnits(b.dataset.u)));
document.querySelectorAll("#modeseg button").forEach(b=>b.addEventListener("click",()=>{ S.mode=b.dataset.m; syncMode(); render(); }));
[["project","project"],["tag","tag"],["reqTC","reqTC"],["reqSC","reqSC"],["airflow","airflow"],["db","db"],["wb","wb"],["amb","amb"]]
  .forEach(([id,key])=>el(id).addEventListener("input",e=>{ S[key]=e.target.value; render(); }));
el("model").addEventListener("change",e=>{ S.model=e.target.value; S.airflow=""; el("airflow").value=""; render(); });
el("printbtn").addEventListener("click",openSheet);

renderModelOptions(); syncMode(); render();
</script>
